services:
  php:
    image: ${IMAGE}:${IMAGE_TAG:-latest}
    container_name: parse_php
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - uploads:/var/www/html/var/uploads
    networks:
      - parse
    depends_on:
      - postgres
      - rabbitmq

  worker:
    image: ${IMAGE}:${IMAGE_TAG:-latest}
    container_name: parse_worker
    restart: unless-stopped
    env_file: .env.prod
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "--memory-limit=256M"]
    volumes:
      - uploads:/var/www/html/var/uploads
    networks:
      - parse
    depends_on:
      - postgres
      - rabbitmq

  nginx:
    image: nginx:alpine
    container_name: parse_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
    networks:
      - parse
      - traefik
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.parse.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.parse.entrypoints=websecure"
      - "traefik.http.routers.parse.tls.certresolver=letsencrypt"
      - "traefik.http.routers.parse-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.parse-http.entrypoints=web"
      - "traefik.http.routers.parse-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.docker.network=traefik"

  postgres:
    image: postgres:16-alpine
    container_name: parse_postgres
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - parse

  rabbitmq:
    image: rabbitmq:3-management
    container_name: parse_rabbitmq
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - parse

networks:
  parse:
    driver: bridge
  traefik:
    external: true

volumes:
  postgres_data:
  rabbitmq_data:
  uploads:
