# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    app.upload_dir: '%kernel.project_dir%/var/uploads'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # Third-party vendor class outside src/ — must be registered explicitly
    Smalot\PdfParser\Parser: ~

    # Domain service interface bindings — kept here because the Domain layer must not
    # import Symfony attributes (see CLAUDE.md). Infrastructure adapters use #[AsAlias] instead.
    App\Domain\Parsing\Service\TextCleanerInterface:
        class: App\Domain\Parsing\Service\TextCleaner

    App\Domain\Parsing\Service\SchemaValidatorInterface:
        class: App\Domain\Parsing\Service\SchemaValidator
