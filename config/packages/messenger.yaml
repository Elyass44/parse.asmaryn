framework:
    messenger:
        failure_transport: failed

        transports:
            # Main async transport for ParseResumeCommand.
            # Retry: 1s → 5s → 25s (exponential, multiplier 5).
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 5

            # Dedicated transport for webhook delivery with slower retry cadence.
            # Retry: 30s → 5min → 30min (capped).
            async_webhook:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: webhook
                retry_strategy:
                    max_retries: 3
                    delay: 30000
                    multiplier: 10
                    max_delay: 1800000

            failed: 'doctrine://default?queue_name=failed'

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            App\Application\Parsing\Command\ParseResumeCommand: async
            App\Application\Parsing\Command\NotifyWebhookCommand: async_webhook
